<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Form Register</h2>
    <p> Please Fillout the form Below</p>
    <form>
        <table Border="0" cellpadding="10">
            <tr>
                <td>Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td><input type="radio" name="sex">Male
                    <input type="radio" name="sex">Female
                </td>
            </tr>
            <tr><td>Operating System</td>
                <td><select>
                    <option>Windows</option>
                    <option>Linux</option>
                    <option>IOS</option>
                </select></td>
            </tr>
            <tr><td>Toys</td>
                <td><input type="checkbox">Digital Camera
                    <input type="checkbox">MP3 Player
                    <input type="checkbox">Wireless LAN
                </td>
            </tr>
            <tr>
                <td>Portrait</td>
                <td><input type="file"></td>
            </tr>
            <tr>
                <td>Mini Biography</td>
                <td><textarea cols="30" rows="5"></textarea></td>
            </tr>
        </table>
    </form>
</body>
</html>
